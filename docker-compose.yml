version: '3.8'

services:
  # ==================== 基础设施 ====================
  postgres:
    image: postgres:16-alpine
    container_name: mirofish-postgres
    environment:
      POSTGRES_DB: mirofish
      POSTGRES_USER: mirofish
      POSTGRES_PASSWORD: mirofish_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirofish"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mirofish-net

  redis:
    image: redis:7-alpine
    container_name: mirofish-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mirofish-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mirofish-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mirofish-net

  # ==================== Go 微服务 ====================
  api-gateway:
    build:
      context: .
      dockerfile: deployments/Dockerfile.gateway
    container_name: mirofish-gateway
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mirofish
      - DB_PASSWORD=mirofish_dev_2026
      - DB_NAME=mirofish
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_AGENT_URL=http://ai-agent:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mirofish-net

  simulation-engine:
    build:
      context: .
      dockerfile: deployments/Dockerfile.engine
    container_name: mirofish-engine
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - AI_AGENT_URL=http://ai-agent:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_started
    networks:
      - mirofish-net

  data-ingestion:
    build:
      context: .
      dockerfile: deployments/Dockerfile.ingestion
    container_name: mirofish-ingestion
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - mirofish-net

  cleanup-service:
    build:
      context: .
      dockerfile: deployments/Dockerfile.cleanup
    container_name: mirofish-cleanup
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mirofish-net

  # ==================== Python AI 服务 ====================
  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: mirofish-ai-agent
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mirofish:mirofish_dev_2026@postgres:5432/mirofish
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LLM_API_KEY=${LLM_API_KEY:-sk-placeholder}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - LLM_MODEL=${LLM_MODEL:-glm-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - mirofish-net

  distill-service:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile.distill
    container_name: mirofish-distill
    environment:
      - DATABASE_URL=postgresql://mirofish:mirofish_dev_2026@postgres:5432/mirofish
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LLM_API_KEY=${LLM_API_KEY:-sk-placeholder}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_started
    networks:
      - mirofish-net

  # ==================== 前端 ====================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mirofish-web
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - mirofish-net

  # ==================== 可观测性 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: mirofish-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mirofish-net

  grafana:
    image: grafana/grafana:latest
    container_name: mirofish-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mirofish-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: mirofish-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - mirofish-net

# ==================== 持久卷 ====================
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  grafana_data:

# ==================== 网络 ====================
networks:
  mirofish-net:
    driver: bridge
